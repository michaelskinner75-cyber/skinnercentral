<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#120b16"><title>Reaction Game | Skinners Bar Games</title><style>:root{--gold:#f7c85e;--gold2:#ffed9d;--pink:#ff4aa2;--purple:#8b5cf6;--text:#fff7eb;--muted:#c6b6c8;--green:#42e695;--red:#ff5a6f}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#28102d,#100812 50%,#08060a);color:var(--text);font-family:Inter,ui-rounded,"Segoe UI",sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{width:min(780px,100%);margin:auto;padding:18px 14px 30px}.bar{display:flex;align-items:center;gap:12px;margin-bottom:18px}.mark{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(145deg,var(--gold2),var(--gold));color:#21131e;font-weight:1000}.home{margin-left:auto;width:46px;height:44px;border-radius:14px;border:1px solid #ffffff26;background:#ffffff14;color:#fff}.eyebrow{text-transform:uppercase;font-size:.68rem;letter-spacing:.16em;color:var(--gold);font-weight:800}h1{font-size:clamp(1.2rem,5vw,1.8rem);margin:3px 0 0}.glass{background:linear-gradient(145deg,#36203de8,#190e1ded);border:1px solid #ffffff1a;box-shadow:0 18px 60px #0006}.panel{border-radius:25px;padding:20px;margin-bottom:14px}.muted{color:var(--muted);line-height:1.5}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.btn{min-height:52px;border-radius:16px;border:1px solid #ffffff1f;padding:12px 15px;font-weight:900;color:var(--text);background:#ffffff14}.primary{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#241521;border:0}.field{display:grid;gap:7px;margin-top:10px}.field label{font-size:.8rem;color:var(--muted);font-weight:800}.field input,.field select,.field textarea{width:100%;min-height:50px;border-radius:14px;border:1px solid #ffffff21;background:#0004;color:white;padding:10px 14px}.hidden{display:none!important}.room-code{text-align:center;font-size:3.7rem;letter-spacing:.12em;font-weight:1000;color:var(--gold2)}.players,.leaderboard{display:grid;gap:8px}.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 13px;border-radius:14px;background:#ffffff0f}.arena{min-height:350px;width:100%;border-radius:26px;display:grid;place-items:center;text-align:center;padding:24px;touch-action:manipulation;color:#fff}.arena.ready{background:linear-gradient(145deg,#36203df0,#190e1df5)}.arena.waiting{background:radial-gradient(circle,#ff5a6f47,#230c19f5)}.arena.go{background:radial-gradient(circle,#42e695a6,#085c39f5)}.arena.result{background:radial-gradient(circle,#f7c85e61,#2d1c0cf5)}.icon{font-size:clamp(4rem,18vw,8rem)}.title{font-size:clamp(2rem,9vw,4rem);font-weight:1000}.hint{color:var(--gold2);font-weight:1000;margin-top:14px}.topline{display:flex;justify-content:space-between;gap:10px;align-items:center}.pill{padding:8px 11px;border-radius:999px;background:#ffffff14;font-size:.76rem;font-weight:900}.status{text-align:center;color:var(--muted);min-height:24px}@media(max-width:560px){.grid{grid-template-columns:1fr}.panel{padding:16px}.arena{min-height:320px}}</style></head><body><main class="app"><header class="bar"><div class="mark">SB</div><div><div class="eyebrow">Skinners Bar Games</div><h1>Reaction Game</h1></div><button class="home" onclick="location.href='index.html'">🏠</button></header><section id="menu" class="panel glass"><div class="eyebrow">Choose how to play</div><h2>Reaction Game</h2><p class="muted">Wait for green, then tap as fast as possible.</p><div class="grid"><button id="localBtn" class="btn primary">👥 Play on this device</button><button id="remoteBtn" class="btn">🌐 Play remotely</button></div></section><section id="localSetup" class="panel glass hidden"><h2>Players on this device</h2><div class="field"><label>Player names — one per line</label><textarea id="localNames" rows="5">Michael
Player 2</textarea></div><div class="field"><label>Rounds per player</label><select id="localRounds"><option>1</option><option selected>3</option><option>5</option></select></div><button id="startLocal" class="btn primary" style="width:100%;margin-top:12px">Start Local Game</button></section><section id="remoteSetup" class="panel glass hidden"><h2>Remote multiplayer</h2><div class="grid"><button id="createRoom" class="btn primary">Create Room</button><button id="showJoin" class="btn">Join Room</button></div><div id="joinFields" class="hidden"><div class="field"><label>Your name</label><input id="joinName" maxlength="18" value="Player"></div><div class="field"><label>Four-digit room code</label><input id="joinCode" maxlength="4" inputmode="numeric"></div><button id="joinRoom" class="btn primary" style="width:100%;margin-top:12px">Join Game</button></div><p id="remoteStatus" class="status"></p></section><section id="lobby" class="panel glass hidden"><div class="eyebrow">Room code</div><div id="roomCode" class="room-code">----</div><div class="field"><label>Your name</label><input id="hostName" maxlength="18" value="Michael"></div><div class="field"><label>Rounds</label><select id="remoteRounds"><option>1</option><option selected>3</option><option>5</option></select></div><h3>Players</h3><div id="playerList" class="players"></div><button id="startRemote" class="btn primary hidden" style="width:100%;margin-top:12px">Start Game</button></section><section id="game" class="hidden"><div class="topline"><div><div class="eyebrow" id="modeLabel">Reaction challenge</div><h2 id="playerLabel">Player</h2></div><span class="pill" id="roundLabel">Round 1</span></div><button id="arena" class="arena ready glass"><div><div id="arenaIcon" class="icon">⚡</div><div id="arenaTitle" class="title">Ready?</div><div id="arenaNote" class="muted">Tap to begin.</div><div id="arenaHint" class="hint">TAP TO START</div></div></button><section class="panel glass" style="margin-top:14px"><h3>Leaderboard</h3><div id="leaderboard" class="leaderboard"></div></section></section></main><script type="module">import{initializeApp}from'https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js';import{getDatabase,ref,get,set,update,onValue,onDisconnect,serverTimestamp}from'https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js';const cfg={apiKey:'AIzaSyAhQcvXPsAkc22WQmnLII17JUNnYj_oeKQ',authDomain:'skinners-bar-bingo.firebaseapp.com',databaseURL:'https://skinners-bar-bingo-default-rtdb.europe-west1.firebasedatabase.app',projectId:'skinners-bar-bingo',storageBucket:'skinners-bar-bingo.firebasestorage.app',messagingSenderId:'1033478065497',appId:'1:1033478065497:web:e7b4904fd9ef7afd171048'};const db=getDatabase(initializeApp(cfg)),$=id=>document.getElementById(id),id=localStorage.reactionPlayerId||crypto.randomUUID();localStorage.reactionPlayerId=id;let mode='',localPlayers=[],localIndex=0,round=1,totalRounds=3,state='ready',timer,goAt=0,room='',isHost=false,roomData={};const show=id=>['menu','localSetup','remoteSetup','lobby','game'].forEach(x=>$(x).classList.toggle('hidden',x!==id));function arena(s,i,t,n,h=''){state=s;$('arena').className=`arena ${s} glass`;$('arenaIcon').textContent=i;$('arenaTitle').textContent=t;$('arenaNote').textContent=n;$('arenaHint').textContent=h}function delay(){return 1800+Math.random()*3000}function esc(s){return String(s).replace(/[<>&]/g,'')}function renderBoard(entries){$('leaderboard').innerHTML=entries.length?entries.sort((a,b)=>(a.best??99999)-(b.best??99999)).map((p,i)=>`<div class="row"><span>${i+1}. ${esc(p.name)}</span><b>${p.best?Math.round(p.best)+' ms':'—'}</b></div>`).join(''):'<div class="muted">No results yet.</div>'}function startLocalTurn(){const p=localPlayers[localIndex];$('playerLabel').textContent=`${p.name}'s turn`;$('modeLabel').textContent='One device multiplayer';$('roundLabel').textContent=`Round ${round} of ${totalRounds}`;arena('ready','⚡','Ready?',`Pass the device to ${p.name}, then tap to begin.`,'TAP TO START');renderBoard(localPlayers)}function finishLocal(ms){const p=localPlayers[localIndex];if(typeof ms==='number'){p.times.push(ms);p.best=Math.min(...p.times)}localIndex++;if(localIndex>=localPlayers.length){localIndex=0;round++}if(round>totalRounds){arena('result','🏆','Game finished','Fastest player wins.','PLAY AGAIN');state='localFinished';renderBoard(localPlayers);return}setTimeout(startLocalTurn,700)}async function createRemote(){const code=String(Math.floor(1000+Math.random()*9000)),name='Michael';room=code;isHost=true;await set(ref(db,`reactionRooms/${room}`),{hostId:id,phase:'lobby',round:1,rounds:3,players:{[id]:{name,connected:true,times:[],best:null}}});await onDisconnect(ref(db,`reactionRooms/${room}/players/${id}`)).update({connected:false,lastSeen:serverTimestamp()});listen()}async function joinRemote(){room=$('joinCode').value.trim();if(!/^\d{4}$/.test(room)){$('remoteStatus').textContent='Enter the four-digit code.';return}const snap=await get(ref(db,`reactionRooms/${room}`));if(!snap.exists()){$('remoteStatus').textContent='Room not found.';return}await update(ref(db,`reactionRooms/${room}/players/${id}`),{name:$('joinName').value.trim()||'Player',connected:true,times:[],best:null});await onDisconnect(ref(db,`reactionRooms/${room}/players/${id}`)).update({connected:false,lastSeen:serverTimestamp()});listen()}function listen(){onValue(ref(db,`reactionRooms/${room}`),s=>{if(!s.exists())return;roomData=s.val();isHost=roomData.hostId===id;$('roomCode').textContent=room;$('hostName').disabled=!isHost;$('remoteRounds').disabled=!isHost;$('startRemote').classList.toggle('hidden',!isHost);const ps=Object.entries(roomData.players||{}).map(([pid,p])=>({id:pid,...p})).filter(p=>p.connected!==false);$('playerList').innerHTML=ps.map(p=>`<div class="row"><span>${esc(p.name)}</span><b>${p.id===roomData.hostId?'Host':'Ready'}</b></div>`).join('');if(roomData.phase==='lobby'){show('lobby')}else{show('game');$('modeLabel').textContent='Remote multiplayer';$('playerLabel').textContent=(roomData.players?.[id]?.name||'Player');$('roundLabel').textContent=`Round ${roomData.round} of ${roomData.rounds}`;renderBoard(ps);if(roomData.phase==='waiting')arena('waiting','✋','Wait…','Do not tap until the screen turns green.','WAIT FOR GREEN');if(roomData.phase==='go'){goAt=roomData.goAt;arena('go','🟢','TAP!','Tap now!','GO! GO! GO!')}if(roomData.phase==='results')arena('result','🏆','Round complete','The host can start the next round.','');if(roomData.phase==='finished')arena('result','🏆','Game finished','Check the leaderboard for the winner.','')}})}async function startRemoteRound(){if(!isHost)return;const rounds=Number($('remoteRounds').value),name=$('hostName').value.trim()||'Michael';await update(ref(db,`reactionRooms/${room}`),{rounds,phase:'waiting',[`players/${id}/name`]:name});setTimeout(()=>update(ref(db,`reactionRooms/${room}`),{phase:'go',goAt:Date.now()}),delay())}async function remoteTap(){if(roomData.phase==='waiting'){await update(ref(db,`reactionRooms/${room}/players/${id}`),{last:'early'});arena('result','❌','Too early!','Wait for the green screen.','');return}if(roomData.phase!=='go')return;const ms=Math.max(0,Date.now()-roomData.goAt),p=roomData.players[id]||{},times=[...(p.times||[]),ms],best=Math.min(...times);await update(ref(db,`reactionRooms/${room}/players/${id}`),{times,best,last:ms});const all=Object.values(roomData.players||{}).filter(x=>x.connected!==false);setTimeout(async()=>{if(isHost){const next=(roomData.round||1)+1;if(next>roomData.rounds)await update(ref(db,`reactionRooms/${room}`),{phase:'finished'});else await update(ref(db,`reactionRooms/${room}`),{phase:'results',round:next})}},500);arena('result','⚡',`${Math.round(ms)} ms`,'Reaction recorded.','')} $('localBtn').onclick=()=>show('localSetup');$('remoteBtn').onclick=()=>show('remoteSetup');$('showJoin').onclick=()=>$('joinFields').classList.remove('hidden');$('createRoom').onclick=createRemote;$('joinRoom').onclick=joinRemote;$('startLocal').onclick=()=>{localPlayers=$('localNames').value.split('\n').map(x=>x.trim()).filter(Boolean).slice(0,8).map(name=>({name,times:[],best:null}));if(!localPlayers.length)return;mode='local';totalRounds=Number($('localRounds').value);round=1;localIndex=0;show('game');startLocalTurn()};$('startRemote').onclick=startRemoteRound;$('arena').onclick=()=>{if(mode==='local'||localPlayers.length){if(state==='ready'){arena('waiting','✋','Wait…','Do not tap yet.','WAIT FOR GREEN');timer=setTimeout(()=>{goAt=performance.now();arena('go','🟢','TAP!','Tap now!','GO!')},delay())}else if(state==='waiting'){clearTimeout(timer);arena('result','❌','Too early!','That round is lost.','');setTimeout(()=>finishLocal('early'),600)}else if(state==='go'){const ms=performance.now()-goAt;arena('result','⚡',`${Math.round(ms)} ms`,'Reaction recorded.','');setTimeout(()=>finishLocal(ms),650)}else if(state==='localFinished'){round=1;localIndex=0;localPlayers.forEach(p=>{p.times=[];p.best=null});startLocalTurn()}}else remoteTap()};</script></body></html>
