<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07160f">
<title>Skinners Bar Poker</title>
<link rel="stylesheet" href="poker-pro.css">
</head>
<body>
<div class="app">
<header class="top"><h1>♠ Skinners Bar Texas Hold’em</h1><a class="btn home" href="index.html">🏠 Home</a></header>
<section id="setup" class="panel setup"><h2>Choose how to play</h2><input id="name" maxlength="18" placeholder="Your name"><select id="startingChips"><option value="500">500 starting chips</option><option value="1000" selected>1,000 starting chips</option><option value="2000">2,000 starting chips</option></select><select id="botCount"><option value="1">Play against 1 bot</option><option value="2">Play against 2 bots</option><option value="3" selected>Play against 3 bots</option><option value="4">Play against 4 bots</option><option value="5">Play against 5 bots</option></select><button id="single" class="btn">🤖 Start Single Player</button><div class="setup-divider">or multiplayer</div><button id="create" class="btn ghost">Create Multiplayer Table</button><input id="codeInput" maxlength="4" inputmode="numeric" placeholder="4-digit room code"><button id="join" class="btn ghost">Join Table</button><p id="setupStatus"></p></section>
<section id="lobby" class="panel hidden"><div><small id="roomLabel">Room code</small><div id="roomCode" class="code">----</div><div id="lobbyCount">0/6 players</div></div><div id="lobbyPlayers" class="lobby-list"></div><button id="start" class="btn hidden" style="width:100%">Deal First Hand</button></section>
<section id="game" class="hidden"><div class="poker-table"><div class="table-brand">SKINNERS BAR</div><div class="pot-display"><span>Pot </span><strong id="pot">0</strong></div><div id="community" class="cards community"></div><div id="players" class="players"></div></div><div id="status" class="status panel"></div><section class="panel"><div class="table-meta"><span id="stage">Pre-flop</span><span id="blinds">Blinds 10 / 20</span><span id="toCall">To call: 0</span></div><div class="actions"><button id="fold" class="btn">Fold</button><button id="check" class="btn ghost">Check</button><button id="call" class="btn">Call</button><button id="raise" class="btn">Raise</button></div><div class="bet-panel"><input id="raiseSlider" type="range" min="20" max="500" step="10" value="40"><div id="raiseValue" class="bet-value">40</div></div><div id="handInfo" class="action-label">Your hand will appear here.</div><div id="winnerBanner" class="winner-banner hidden"></div></section></section>
<p class="note">Virtual chips only. No real-money deposits, withdrawals or prizes.</p>
</div>
<script src="poker-pro.js"></script>
</body>
</html>
