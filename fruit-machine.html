<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#17040d">
<title>Skinners Bar Fruit Machine</title>
<style>
:root{--gold:#ffd75e;--pink:#ff3f87;--green:#4be39a;--muted:#d1bfc8}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#641630 0,#220713 42%,#090208 100%);color:#fff;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{width:min(760px,100%);margin:auto;padding:max(14px,env(safe-area-inset-top)) 14px max(26px,env(safe-area-inset-bottom))}.top{display:flex;align-items:center;gap:12px;margin-bottom:14px}.logo{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,var(--gold),#ff8c24);color:#361400;font-weight:1000;box-shadow:0 0 25px #ffd75e66}.title{flex:1}.title small{color:var(--gold);text-transform:uppercase;letter-spacing:.14em;font-weight:900}.title h1{margin:2px 0;font-size:clamp(1.25rem,5vw,2rem)}.home{padding:10px 13px;border-radius:13px;border:1px solid #ffffff2b;background:#ffffff10;color:#fff;text-decoration:none;font-weight:900}.machine{padding:16px;border-radius:28px;background:linear-gradient(145deg,#441021,#200811);border:2px solid #ffd75e55;box-shadow:0 20px 60px #0009,0 0 32px #ff3f8733}.marquee{text-align:center;padding:14px;border-radius:18px;background:linear-gradient(90deg,#9b1539,#f0437a,#9b1539);border:2px solid #ffd75e;color:#fff5bc;font-size:clamp(1.25rem,6vw,2.1rem);font-weight:1000;letter-spacing:.08em;text-shadow:0 2px 0 #6d0926,0 0 12px #fff}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:13px 0}.stat{padding:10px;border-radius:14px;background:#0c0509;border:1px solid #ffffff1d;text-align:center}.stat span{display:block;color:var(--muted);font-size:.7rem;text-transform:uppercase}.stat strong{display:block;color:var(--gold);font-size:1.15rem;margin-top:2px}.reel-window{position:relative;padding:15px;background:#090408;border-radius:22px;border:3px solid #d7aa3a;overflow:hidden}.payline{position:absolute;left:6px;right:6px;top:50%;height:3px;background:#ffef73;box-shadow:0 0 12px #fff27a;z-index:4;pointer-events:none}.reels{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.reel{height:132px;border-radius:15px;background:linear-gradient(#fff7d9,#fff,#fff2c8);display:grid;place-items:center;color:#111;font-size:4.3rem;box-shadow:inset 0 10px 22px #0002,inset 0 -10px 22px #0002;overflow:hidden}.reel.spinning .symbol{animation:blurSpin .13s linear infinite}@keyframes blurSpin{0%{transform:translateY(-20px);filter:blur(1px)}50%{transform:translateY(20px);filter:blur(3px)}100%{transform:translateY(-20px);filter:blur(1px)}}.holds{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}.hold{min-height:44px;border:1px solid #ffffff26;background:#ffffff0d;color:#fff;border-radius:12px;font-weight:900}.hold.active{background:linear-gradient(135deg,#38d78a,#13975a);color:#062514;box-shadow:0 0 18px #4be39a66}.message{text-align:center;min-height:54px;padding:14px 8px;color:#fff;font-weight:900;font-size:1.05rem}.controls{display:grid;grid-template-columns:1fr 1.5fr 1fr;gap:9px}.btn{border:0;border-radius:16px;min-height:58px;padding:12px;font-size:1rem;font-weight:1000;cursor:pointer}.spin{background:linear-gradient(135deg,var(--gold),#ff922d);color:#3a1600;box-shadow:0 7px 0 #9b4900}.nudge{background:linear-gradient(135deg,#a972ff,#6430c7);color:#fff}.sound{background:#ffffff12;color:#fff;border:1px solid #ffffff24}.btn:disabled,.hold:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}.payouts{margin-top:14px;padding:14px;border-radius:20px;background:#ffffff0b;border:1px solid #ffffff1b}.payouts h2{font-size:1rem;margin:0 0 10px;color:var(--gold)}.pay-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}.pay{display:flex;justify-content:space-between;gap:8px;padding:8px 10px;border-radius:10px;background:#0005}.notice{text-align:center;color:var(--muted);font-size:.72rem;margin:12px 0 0}@media(max-width:500px){.machine{padding:12px}.reel{height:105px;font-size:3.3rem}.controls{grid-template-columns:1fr 1.35fr 1fr}.btn{min-height:54px;font-size:.85rem}.home{font-size:0}.home:after{content:'🏠';font-size:1rem}.pay-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="logo">SB</div><div class="title"><small>Skinners Bar Games</small><h1>Fruit Machine</h1></div><a class="home" href="index.html">🏠 Home</a></header>
<main class="machine">
<div class="marquee">SKINNERS JACKPOT</div>
<div class="stats"><div class="stat"><span>Credits</span><strong id="credits">20</strong></div><div class="stat"><span>Last Win</span><strong id="lastWin">0</strong></div><div class="stat"><span>Nudges</span><strong id="nudges">0</strong></div></div>
<section class="reel-window"><div class="payline"></div><div class="reels"><div class="reel" id="reel0"><span class="symbol">🍒</span></div><div class="reel" id="reel1"><span class="symbol">🍋</span></div><div class="reel" id="reel2"><span class="symbol">🔔</span></div></div></section>
<div class="holds"><button class="hold" data-reel="0">HOLD</button><button class="hold" data-reel="1">HOLD</button><button class="hold" data-reel="2">HOLD</button></div>
<div id="message" class="message">Press SPIN — one credit per play.</div>
<div class="controls"><button id="sound" class="btn sound">🔊 Sound</button><button id="spin" class="btn spin">SPIN</button><button id="nudge" class="btn nudge" disabled>NUDGE</button></div>
<section class="payouts"><h2>Prize Table</h2><div class="pay-grid"><div class="pay"><span>7️⃣ 7️⃣ 7️⃣</span><strong>100</strong></div><div class="pay"><span>💎 💎 💎</span><strong>50</strong></div><div class="pay"><span>🔔 🔔 🔔</span><strong>25</strong></div><div class="pay"><span>🍒 🍒 🍒</span><strong>15</strong></div><div class="pay"><span>🍋 🍋 🍋</span><strong>10</strong></div><div class="pay"><span>Any two matching</span><strong>3</strong></div></div></section>
<p class="notice">Entertainment only — no real money, prizes or gambling.</p>
</main>
</div>
<script>
const symbols=['🍒','🍋','🍊','🍉','🔔','💎','7️⃣'];
const weights=['🍒','🍒','🍒','🍋','🍋','🍋','🍊','🍊','🍉','🔔','🔔','💎','7️⃣'];
let reels=['🍒','🍋','🔔'],credits=20,lastWin=0,nudges=0,spinning=false,soundOn=true;
const holds=[false,false,false];
const $=id=>document.getElementById(id);
const holdButtons=[...document.querySelectorAll('.hold')];
let audioCtx;
function beep(freq=440,duration=.08,type='sine',volume=.035){if(!soundOn)return;audioCtx??=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=volume;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+duration);o.stop(audioCtx.currentTime+duration)}
function update(){$('credits').textContent=credits;$('lastWin').textContent=lastWin;$('nudges').textContent=nudges;$('spin').disabled=spinning||credits<1;$('nudge').disabled=spinning||nudges<1;holdButtons.forEach((b,i)=>{b.classList.toggle('active',holds[i]);b.disabled=spinning});reels.forEach((s,i)=>document.querySelector(`#reel${i} .symbol`).textContent=s)}
function randomSymbol(){return weights[Math.floor(Math.random()*weights.length)]}
function prize(){const [a,b,c]=reels;if(a===b&&b===c)return a==='7️⃣'?100:a==='💎'?50:a==='🔔'?25:a==='🍒'?15:a==='🍋'?10:8;if(a===b||b===c||a===c)return 3;return 0}
function finishSpin(){spinning=false;lastWin=prize();if(lastWin){credits+=lastWin;$('message').textContent=`WINNER! You won ${lastWin} credits!`;beep(740,.12,'square',.05);setTimeout(()=>beep(980,.18,'square',.05),120);nudges=Math.random()<.45?Math.ceil(Math.random()*3):0}else{$('message').textContent='No win this time — try again.';beep(180,.12,'sawtooth',.025);nudges=Math.random()<.25?1:0}holds.fill(false);update()}
function spin(){if(spinning||credits<1)return;spinning=true;credits--;lastWin=0;$('message').textContent='Spinning…';document.querySelectorAll('.reel').forEach((el,i)=>{if(!holds[i])el.classList.add('spinning')});update();beep(260,.06,'square');[650,900,1150].forEach((delay,i)=>setTimeout(()=>{if(!holds[i]){reels[i]=randomSymbol();$(`reel${i}`).classList.remove('spinning');beep(360+i*120,.07,'square')}if(i===2)finishSpin()},delay))}
function nudge(){if(spinning||nudges<1)return;nudges--;let target=-1,best=0;for(let i=0;i<3;i++){const temp=[...reels];temp[i]=symbols[(symbols.indexOf(temp[i])+1)%symbols.length];const score=(temp[0]===temp[1])+(temp[1]===temp[2])+(temp[0]===temp[2]);if(score>best){best=score;target=i}}if(target<0)target=Math.floor(Math.random()*3);reels[target]=symbols[(symbols.indexOf(reels[target])+1)%symbols.length];beep(520,.1,'square');$('message').textContent=`Nudged reel ${target+1}.`;lastWin=prize();if(lastWin){credits+=lastWin;$('message').textContent=`NUDGE WIN! You won ${lastWin} credits!`;nudges=0}update()}
holdButtons.forEach((b,i)=>b.onclick=()=>{if(spinning)return;holds[i]=!holds[i];beep(430,.05);update()});$('spin').onclick=spin;$('nudge').onclick=nudge;$('sound').onclick=()=>{soundOn=!soundOn;$('sound').textContent=soundOn?'🔊 Sound':'🔇 Muted';if(soundOn)beep(520,.06);};update();
</script>
</body>
</html>
