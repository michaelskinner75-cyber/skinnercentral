<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mobile Ticket Demo</title>
<style>
  :root{
    --bg:#06131d;
    --card:#f4f4f1;
    --ink:#111;
    --accent:#2ca67a;
    --tilt:0deg;
    --shift:0px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at 50% 15%,#0c2637 0,#071924 42%,#040b10 100%);color:#fff}
  body{display:flex;justify-content:center;align-items:flex-start;padding:calc(env(safe-area-inset-top) + 18px) 14px calc(env(safe-area-inset-bottom) + 18px)}
  .phone{width:min(100%,430px)}
  .topbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-bottom:16px}
  .status{font-weight:700;font-size:18px}.title{font-size:24px;font-weight:700}.close{justify-self:end;width:48px;height:48px;border:3px solid #fff;border-radius:50%;display:grid;place-items:center;font-size:34px;line-height:1;background:transparent;color:white}
  .ticket{position:relative;background:var(--card);color:var(--ink);border-radius:4px;padding:8px 12px 28px;box-shadow:0 10px 34px rgba(0,0,0,.35);overflow:hidden}
  .demo-ribbon{position:absolute;top:18px;right:-42px;transform:rotate(35deg);background:#c62828;color:white;padding:5px 50px;font-weight:800;font-size:12px;letter-spacing:.08em;z-index:5}
  .fare{height:62px;background:#121619;color:#fff;border-radius:0 0 24px 0;display:flex;align-items:center;justify-content:space-between;padding:0 18px;font-size:27px;font-weight:700}
  .qr{width:210px;aspect-ratio:1;margin:30px auto 28px;background:#fff;border:10px solid #fff;outline:2px solid #111;position:relative}
  .qr svg{display:block;width:100%;height:100%}
  .qr-label{position:absolute;inset:50% auto auto 50%;transform:translate(-50%,-50%);background:#fff;color:#c62828;border:3px solid #c62828;border-radius:8px;padding:5px 8px;font-size:20px;font-weight:900;letter-spacing:.08em}
  h1{font-size:34px;text-align:center;margin:0 0 58px;font-weight:500;line-height:1.05}
  .valid{text-align:center;font-size:22px;margin-bottom:12px}
  .motion-wrap{height:92px;margin:0 -7px 18px;display:flex;align-items:center;overflow:hidden}
  .motion-bar{position:relative;width:112%;left:-6%;height:92px;background:#9ca3a5;transform:rotate(var(--tilt)) translateX(var(--shift));transform-origin:center;transition:transform .08s linear;overflow:hidden;border-radius:2px;display:grid;place-items:center}
  .live-time{position:relative;z-index:3;font-size:52px;font-weight:800;letter-spacing:.01em}
  .bubble{position:absolute;border-radius:50%;background:rgba(255,255,255,.52);box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);animation:float var(--dur) ease-in-out infinite alternate;left:var(--x);top:var(--y);width:var(--s);height:var(--s);animation-delay:var(--delay)}
  @keyframes float{from{transform:translate(-8px,-5px)}to{transform:translate(12px,9px)}}
  .expiry{display:flex;justify-content:space-between;align-items:center;font-size:19px;padding:0 26px 24px;gap:15px}.expiry strong{font-size:22px;font-weight:500}
  .ref{margin:0 15px 24px;background:#d9dade;border-radius:13px;text-align:center;padding:7px;font-size:18px;letter-spacing:.02em}
  .more{text-align:center;color:var(--accent);font-size:24px;font-weight:500}
  .back{margin-top:34px;width:62px;height:62px;border:4px solid #49e4b5;border-radius:50%;display:grid;place-items:center;color:#d9fff3;font-size:48px;line-height:1}
  .note{text-align:center;color:#b9c6ce;font-size:12px;margin-top:15px}
  @media(max-width:380px){h1{font-size:29px}.live-time{font-size:45px}.qr{width:180px}.valid{font-size:19px}.fare{font-size:23px}}
</style>
</head>
<body>
<div class="phone">
  <div class="topbar">
    <div class="status" id="statusTime">07:53</div>
    <div class="title">Your Ticket</div>
    <button class="close" aria-label="Close">×</button>
  </div>

  <main class="ticket">
    <div class="demo-ribbon">DEMO ONLY</div>
    <div class="fare"><span>1 Adult</span><span>£12.80</span></div>
    <div class="qr" aria-label="Non-scannable demo QR graphic">
      <svg viewBox="0 0 29 29" role="img" aria-hidden="true" shape-rendering="crispEdges">
        <rect width="29" height="29" fill="#fff"/>
        <g fill="#111">
          <rect x="1" y="1" width="7" height="7"/><rect x="2" y="2" width="5" height="5" fill="#fff"/><rect x="3" y="3" width="3" height="3"/>
          <rect x="21" y="1" width="7" height="7"/><rect x="22" y="2" width="5" height="5" fill="#fff"/><rect x="23" y="3" width="3" height="3"/>
          <rect x="1" y="21" width="7" height="7"/><rect x="2" y="22" width="5" height="5" fill="#fff"/><rect x="3" y="23" width="3" height="3"/>
          <path d="M10 1h2v1h-1v1h2v2h-1v1h-2V5H9V3h1zm5 0h3v1h1v2h-2V3h-2zm-5 7h2v1h2v2h-1v1h-3zm5 0h2v2h2v1h-1v2h-2v-1h-2v-2h1zm5 1h1v2h2v1h2v2h-3v-1h-2zm-10 5h3v1h1v2h-2v1h-2zm5 0h2v1h2v2h-1v2h-2v-1h-2v-2h1zm6 2h2v1h1v2h-2v1h-2v-2h1zm-11 4h2v2h2v1h-1v2h-3v-1H9v-2h1zm5 1h2v1h2v2h-1v2h-2v-1h-2v-2h1zm5 2h2v-2h2v1h2v2h-1v2h-2v-1h-3z"/>
        </g>
      </svg>
      <span class="qr-label">DEMO</span>
    </div>
    <h1>East Scotland DayRider</h1>
    <div class="valid" id="validDate">Valid from: 00:00, 14 Jul 2026</div>

    <div class="motion-wrap">
      <div class="motion-bar" id="motionBar">
        <span class="bubble" style="--x:4%;--y:8%;--s:74px;--dur:2.8s;--delay:-.5s"></span>
        <span class="bubble" style="--x:21%;--y:45%;--s:28px;--dur:2.1s;--delay:-1.2s"></span>
        <span class="bubble" style="--x:45%;--y:15%;--s:42px;--dur:3.2s;--delay:-.8s"></span>
        <span class="bubble" style="--x:62%;--y:48%;--s:60px;--dur:2.5s;--delay:-1.7s"></span>
        <span class="bubble" style="--x:83%;--y:10%;--s:34px;--dur:2.9s;--delay:-.1s"></span>
        <span class="live-time" id="liveTime">07:53</span>
      </div>
    </div>

    <div class="expiry"><span>Ticket expires in</span><strong id="countdown">20h : 06m : 23s</strong></div>
    <div class="ref">DEMO-ONLY-NOT-VALID</div>
    <div class="more">More details ›</div>
  </main>
  <div class="back">‹</div>
  <div class="note">Visual prototype only — not valid for travel.</div>
</div>

<script>
(() => {
  const live = document.getElementById('liveTime');
  const status = document.getElementById('statusTime');
  const validDate = document.getElementById('validDate');
  const countdown = document.getElementById('countdown');
  const pad = n => String(n).padStart(2,'0');

  function tick(){
    const now = new Date();
    const hhmm = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
    live.textContent = hhmm;
    status.textContent = hhmm;
    validDate.textContent = `Valid from: 00:00, ${now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}`;
    const end = new Date(now); end.setHours(23,59,59,999);
    const ms = Math.max(0,end-now);
    const h = Math.floor(ms/3600000), m = Math.floor(ms%3600000/60000), s = Math.floor(ms%60000/1000);
    countdown.textContent = `${h}h : ${pad(m)}m : ${pad(s)}s`;
  }
  tick(); setInterval(tick,1000);

  const applyTilt = (x) => {
    const clamped = Math.max(-1,Math.min(1,x));
    document.documentElement.style.setProperty('--tilt', `${clamped*5}deg`);
    document.documentElement.style.setProperty('--shift', `${clamped*8}px`);
  };

  window.addEventListener('deviceorientation', e => {
    if (typeof e.gamma === 'number') applyTilt(e.gamma/35);
  }, true);

  window.addEventListener('pointermove', e => applyTilt((e.clientX/innerWidth-.5)*2));

  document.addEventListener('click', async () => {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      try { await DeviceOrientationEvent.requestPermission(); } catch (_) {}
    }
  }, {once:true});
})();
</script>
</body>
</html>
