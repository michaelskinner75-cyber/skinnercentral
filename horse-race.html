<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Skinners Bar Horse Race</title><style>*{box-sizing:border-box}body{margin:0;background:#0a2114;color:#fff;font-family:system-ui}.app{max-width:900px;margin:auto;padding:16px}.top{display:flex;align-items:center;gap:12px}.top h1{flex:1}.home,button{border:0;border-radius:14px;padding:12px 16px;font-weight:900}.home{background:#ffffff14;color:#fff;text-decoration:none}.panel{margin-top:14px;padding:16px;background:#ffffff10;border-radius:20px}.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.pick{background:#ffffff12;color:#fff}.pick.active{outline:4px solid #ffd75c}.start{width:100%;margin-top:12px;background:#ffd75c;color:#321500}.hidden{display:none}.track{position:relative;overflow:hidden;background:#5b3a20;border:5px solid #c9aa65;border-radius:18px;padding:8px}.finish{position:absolute;right:22px;top:0;bottom:0;width:10px;background:repeating-linear-gradient(#fff 0 10px,#111 10px 20px)}.lane{position:relative;height:60px;background:#4b8236;border-bottom:2px dashed #ffffff66}.runner{position:absolute;left:4px;top:8px;font-size:2.5rem}.label{position:absolute;left:4px;bottom:2px;font-size:.65rem;background:#0008;padding:2px 5px;border-radius:6px}.row{display:flex;justify-content:space-between;padding:9px;background:#0004;border-radius:9px;margin-top:7px}.status{text-align:center;font-weight:900}@media(max-width:600px){.choices{grid-template-columns:1fr 1fr}.lane{height:52px}}</style></head><body><div class="app"><div class="top"><div>🏇</div><h1>Horse Race</h1><a class="home" href="index.html">🏠 Home</a></div><section id="setup" class="panel"><h2>Select a horse</h2><div id="choices" class="choices"></div><button id="start" class="start" disabled>Start Race</button></section><section id="race" class="panel hidden"><div id="track" class="track"><div class="finish"></div><div id="lanes"></div></div><div id="status" class="panel status">Ready</div></section><section id="results" class="panel hidden"><h2>Results</h2><div id="board"></div><p id="verdict" class="status"></p><button id="again" class="start">Race Again</button></section></div><script>const H=[['Thunder','🐎'],['Lucky Lad','🏇'],['Red Rocket','🐴'],['Fife Flyer','🐎'],['Golden Hoof','🏇'],['Last Orders','🐴']],$=x=>document.getElementById(x);let chosen=-1,busy=false;function build(){const c=$('choices');c.innerHTML='';H.forEach((h,i)=>{const b=document.createElement('button');b.className='pick';b.innerHTML=`<div style="font-size:2rem">${h[1]}</div><b>${i+1}. ${h[0]}</b>`;b.onclick=()=>{chosen=i;[...c.children].forEach((x,j)=>x.classList.toggle('active',j===i));$('start').disabled=false};c.appendChild(b)})}function go(){if(chosen<0||busy)return;busy=true;$('setup').classList.add('hidden');$('race').classList.remove('hidden');const l=$('lanes');l.innerHTML='';const r=H.map((h,i)=>{const d=document.createElement('div');d.className='lane';d.innerHTML=`<span class="label">${i+1}. ${h[0]}</span><span class="runner">${h[1]}</span>`;l.appendChild(d);return d.querySelector('.runner')});requestAnimationFrame(()=>{const end=Math.max(100,$('track').clientWidth-100),p=H.map(()=>0),v=H.map(()=>.05+Math.random()*.03),order=[];let last=performance.now();function frame(now){const dt=Math.min(40,now-last);last=now;p.forEach((x,i)=>{if(x>=end)return;v[i]=Math.max(.035,Math.min(.1,v[i]+(Math.random()-.49)*.004));p[i]=Math.min(end,x+v[i]*dt);r[i].style.transform=`translateX(${p[i]}px)`;if(p[i]>=end&&!order.includes(i))order.push(i)});if(order.length<H.length){$('status').textContent=H[p.indexOf(Math.max(...p))][0]+' is leading!';requestAnimationFrame(frame)}else done(order)}requestAnimationFrame(frame)})}function done(order){busy=false;$('race').classList.add('hidden');$('results').classList.remove('hidden');$('board').innerHTML=order.map((i,n)=>`<div class="row"><span>${n+1}. ${H[i][1]} ${H[i][0]}</span><b>${n===0?'WINNER':''}</b></div>`).join('');const place=order.indexOf(chosen)+1;$('verdict').textContent=place===1?H[chosen][0]+' won!':H[chosen][0]+' finished '+place+'.'}$('start').onclick=go;$('again').onclick=()=>{chosen=-1;$('results').classList.add('hidden');$('setup').classList.remove('hidden');$('start').disabled=true;build()};build();</script></body></html>
