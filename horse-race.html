<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0a2114"><title>Skinners Bar Race Night</title><style>:root{--gold:#ffd75c;--green:#4d8b38;--panel:#ffffff10;--muted:#d5d8d1}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#174d31,#0a2114 55%,#041008);color:#fff;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{width:min(1050px,100%);margin:auto;padding:max(14px,env(safe-area-inset-top)) 14px max(26px,env(safe-area-inset-bottom))}.top{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#ff982c);color:#311400;font-weight:1000;box-shadow:0 0 24px #ffd75c55}.title{flex:1}.title small{color:var(--gold);font-weight:900;text-transform:uppercase;letter-spacing:.12em}.title h1{margin:2px 0;font-size:clamp(1.25rem,5vw,2rem)}.home,button,input,select{font:inherit}.home,button{border:0;border-radius:14px;min-height:46px;padding:11px 15px;font-weight:900;cursor:pointer}.home{background:#ffffff14;color:#fff;text-decoration:none;border:1px solid #ffffff22}.panel{margin-top:14px;padding:16px;border-radius:22px;background:var(--panel);border:1px solid #ffffff20;box-shadow:0 18px 50px #0007}.setup-top{display:flex;align-items:end;justify-content:space-between;gap:12px;flex-wrap:wrap}.setup-top h2{margin:0}.count-wrap{display:flex;align-items:center;gap:8px}.count-wrap label{color:var(--muted);font-size:.8rem}.count-wrap select{min-height:42px;border-radius:12px;border:1px solid #ffffff22;background:#08160e;color:#fff;padding:8px 10px}.entries{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:14px}.entry{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;padding:11px;border-radius:16px;background:#0004;border:1px solid #ffffff16}.horse-icon{font-size:2rem;width:40px;text-align:center}.entry strong{display:block;font-size:.82rem;color:var(--gold);margin-bottom:5px}.entry input{width:100%;min-height:42px;border-radius:11px;border:1px solid #ffffff22;background:#06120b;color:#fff;padding:9px 10px}.entry input::placeholder{color:#aeb8b0}.start{width:100%;margin-top:14px;background:linear-gradient(135deg,var(--gold),#ff982c);color:#321500;box-shadow:0 7px 0 #995000}.start:disabled{opacity:.45;box-shadow:none;cursor:not-allowed}.hidden{display:none!important}.track{position:relative;overflow:hidden;background:#5b3a20;border:5px solid #c9aa65;border-radius:20px;padding:8px}.finish{position:absolute;right:22px;top:0;bottom:0;width:10px;background:repeating-linear-gradient(#fff 0 10px,#111 10px 20px);z-index:2}.lane{position:relative;height:58px;background:linear-gradient(90deg,#447a34,#5a9d45);border-bottom:2px dashed #ffffff66;overflow:hidden}.lane:last-child{border-bottom:0}.runner{position:absolute;left:5px;top:7px;font-size:2.45rem;will-change:transform;z-index:1}.label{position:absolute;left:6px;bottom:2px;font-size:.68rem;background:#0009;padding:3px 7px;border-radius:7px;max-width:72%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.status{text-align:center;font-weight:1000;color:var(--gold);font-size:1.05rem}.row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;background:#0004;border-radius:11px;margin-top:7px}.row.winner{outline:2px solid var(--gold);background:#ffd75c18}.again{width:100%;margin-top:14px;background:linear-gradient(135deg,var(--gold),#ff982c);color:#321500}.hint{margin:10px 0 0;color:var(--muted);font-size:.78rem;text-align:center}@media(max-width:650px){.entries{grid-template-columns:1fr}.lane{height:52px}.runner{font-size:2.15rem}.home{font-size:0;width:44px;padding:8px}.home:after{content:'🏠';font-size:1rem}.setup-top{align-items:stretch}.count-wrap{justify-content:space-between;width:100%}}</style></head><body><div class="app"><header class="top"><div class="logo">SB</div><div class="title"><small>Skinners Bar Games</small><h1>Race Night</h1></div><a class="home" href="index.html">🏠 Home</a></header><section id="setup" class="panel"><div class="setup-top"><div><h2>Add your racers</h2><div class="hint" style="text-align:left">Enter one person's name for each horse.</div></div><div class="count-wrap"><label for="horseCount">Number of horses</label><select id="horseCount"><option>4</option><option>5</option><option>6</option><option>7</option><option selected>8</option><option>9</option><option>10</option><option>11</option><option>12</option></select></div></div><div id="entries" class="entries"></div><button id="start" class="start">Start Race</button></section><section id="race" class="panel hidden"><div id="track" class="track"><div class="finish"></div><div id="lanes"></div></div><div id="status" class="panel status">Ready</div></section><section id="results" class="panel hidden"><h2>Race Results</h2><div id="board"></div><p id="verdict" class="status"></p><button id="again" class="again">Race Again</button></section></div><script>const horseNames=['Thunder','Lucky Lad','Red Rocket','Fife Flyer','Golden Hoof','Last Orders','Midnight Dash','Bar Runner','Neon Rider','Photo Finish','Quick Pint','Final Bell'];const icons=['🐎','🏇','🐴','🐎','🏇','🐴','🐎','🏇','🐴','🐎','🏇','🐴'];const $=id=>document.getElementById(id);let racers=[],busy=false;function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function buildEntries(){const count=+$('horseCount').value,wrap=$('entries'),old=[...wrap.querySelectorAll('input')].map(x=>x.value);wrap.innerHTML='';for(let i=0;i<count;i++){const box=document.createElement('label');box.className='entry';box.innerHTML=`<span class="horse-icon">${icons[i]}</span><span><strong>${i+1}. ${horseNames[i]}</strong><input maxlength="20" placeholder="Person's name" value="${esc(old[i]||'')}"></span>`;wrap.appendChild(box)}}function getRacers(){return [...$('entries').querySelectorAll('.entry')].map((entry,i)=>({horse:horseNames[i],icon:icons[i],person:entry.querySelector('input').value.trim()||`Player ${i+1}`}))}function go(){if(busy)return;racers=getRacers();if(racers.length<4)return;busy=true;$('setup').classList.add('hidden');$('results').classList.add('hidden');$('race').classList.remove('hidden');$('status').textContent="And they're off!";const lanes=$('lanes');lanes.innerHTML='';const runners=racers.map((r,i)=>{const lane=document.createElement('div');lane.className='lane';lane.innerHTML=`<span class="label">${i+1}. ${esc(r.person)} — ${r.horse}</span><span class="runner">${r.icon}</span>`;lanes.appendChild(lane);return lane.querySelector('.runner')});requestAnimationFrame(()=>{const end=Math.max(120,$('track').clientWidth-105),progress=racers.map(()=>0),speed=racers.map(()=>.055+Math.random()*.03),order=[];let last=performance.now(),lastLeader=-1;function frame(now){const dt=Math.min(42,now-last);last=now;progress.forEach((p,i)=>{if(p>=end)return;speed[i]=Math.max(.035,Math.min(.115,speed[i]+(Math.random()-.49)*.005));progress[i]=Math.min(end,p+speed[i]*dt);runners[i].style.transform=`translateX(${progress[i]}px)`;if(progress[i]>=end&&!order.includes(i))order.push(i)});const lead=progress.indexOf(Math.max(...progress));if(lead!==lastLeader){lastLeader=lead;$('status').textContent=`${racers[lead].person} on ${racers[lead].horse} is leading!`}if(order.length<racers.length)requestAnimationFrame(frame);else finish(order)}requestAnimationFrame(frame)})}function ordinal(n){const v=n%100;return n+(['th','st','nd','rd'][(v-20)%10]||['th','st','nd','rd'][v]||'th')}function finish(order){busy=false;$('race').classList.add('hidden');$('results').classList.remove('hidden');$('board').innerHTML=order.map((i,n)=>`<div class="row ${n===0?'winner':''}"><span>${ordinal(n+1)} · ${racers[i].icon} <b>${esc(racers[i].person)}</b> <small>(${racers[i].horse})</small></span><strong>${n===0?'WINNER':''}</strong></div>`).join('');const winner=racers[order[0]];$('verdict').textContent=`🏆 ${winner.person} wins on ${winner.horse}!`}function reset(){busy=false;$('results').classList.add('hidden');$('race').classList.add('hidden');$('setup').classList.remove('hidden')} $('horseCount').onchange=buildEntries;$('start').onclick=go;$('again').onclick=reset;buildEntries();</script></body></html>
