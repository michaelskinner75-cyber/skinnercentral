<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#16070c">
<title>Skinners Bar Deal or No Deal</title>
<style>
:root{--bg:#11070a;--panel:#231016;--gold:#ffd45c;--red:#d81f3f;--cream:#fff4d6;--muted:#cdb9bd;--green:#3bd486}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#4a111d 0,#17080d 42%,#080305 100%);color:#fff;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden}.app{width:min(1100px,100%);margin:auto;padding:max(14px,env(safe-area-inset-top)) 14px max(24px,env(safe-area-inset-bottom))}.topbar{display:flex;align-items:center;gap:12px;margin-bottom:14px}.logo{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,var(--gold),#f18f24);color:#33120b;font-weight:1000;box-shadow:0 0 25px #ffbb3d55}.title{flex:1;min-width:0}.title small{color:var(--gold);font-weight:800;text-transform:uppercase;letter-spacing:.14em}.title h1{font-size:clamp(1.2rem,5vw,2rem);margin:2px 0}.home{border:1px solid #ffffff2a;background:#ffffff10;color:#fff;border-radius:14px;padding:11px 13px;text-decoration:none;font-weight:900;flex:0 0 auto}.panel{background:linear-gradient(145deg,#ffffff12,#ffffff08);border:1px solid #ffffff1b;border-radius:24px;box-shadow:0 18px 50px #0008;backdrop-filter:blur(10px)}.status{padding:18px;text-align:center;margin-bottom:14px}.status h2{margin:0 0 6px;color:var(--gold)}.status p{margin:0;color:var(--muted)}.game{display:grid;grid-template-columns:minmax(135px,160px) minmax(0,1fr) minmax(135px,160px);gap:14px;align-items:start}.money-board{padding:12px;display:grid;gap:5px;align-content:start;min-width:0}.money{padding:7px 5px;border-radius:9px;text-align:center;font-weight:1000;font-size:.78rem;background:linear-gradient(90deg,#ebc536,#fff0a2);color:#321c00;border:1px solid #fff7b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.money.low{background:linear-gradient(90deg,#4d8fdd,#a7d5ff);color:#041c36}.money.gone{opacity:.2;text-decoration:line-through;filter:grayscale(1)}.centre{min-width:0;width:100%;position:relative;z-index:2}.player-box{padding:16px;text-align:center;margin-bottom:12px}.player-box .case{width:130px;height:84px;margin:8px auto 0}.boxes{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:9px;width:100%;position:relative;z-index:3}.case{position:relative;width:100%;max-width:100%;border:0;border-radius:12px;background:linear-gradient(145deg,#f43a50,#a80f25);color:#fff;min-height:69px;font-size:1.35rem;font-weight:1000;box-shadow:inset 0 2px 0 #ffffff55,0 7px 0 #650817,0 12px 18px #0007;cursor:pointer;overflow:visible;touch-action:manipulation}.case:before{content:"";position:absolute;left:33%;right:33%;top:-7px;height:9px;border:3px solid #e5c26b;border-bottom:0;border-radius:7px 7px 0 0}.case:hover{transform:translateY(-2px)}.case.opened{background:#3a2a2e;color:#a99298;box-shadow:none;transform:none;cursor:default}.case.opened:before{display:none}.case.chosen{outline:4px solid var(--gold);background:linear-gradient(145deg,#ffdf67,#d79216);color:#381d00;box-shadow:0 0 30px #ffd45c88}.case.reveal{animation:pop .45s ease}@keyframes pop{50%{transform:scale(1.06) rotate(-1deg)}}.controls{padding:14px;margin-top:14px;text-align:center}.primary,.deal,.no-deal,.restart{border:0;border-radius:15px;min-height:52px;padding:12px 18px;font-weight:1000;font-size:1rem;cursor:pointer}.primary{background:linear-gradient(135deg,var(--gold),#f39b25);color:#351500}.restart{background:#ffffff14;color:#fff;border:1px solid #ffffff24}.offer{position:fixed;inset:0;background:#050203dd;display:grid;place-items:center;padding:18px;z-index:20}.offer.hidden{display:none}.offer-card{width:min(430px,100%);padding:26px;text-align:center}.phone{font-size:3rem}.offer h2{margin:7px 0}.amount{font-size:clamp(2.4rem,12vw,4.4rem);font-weight:1000;color:var(--gold);margin:14px 0;text-shadow:0 0 24px #ffca4b66}.offer-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.deal{background:linear-gradient(135deg,#43e08e,#169c5a);color:#052514}.no-deal{background:linear-gradient(135deg,#f0445d,#aa102b);color:#fff}.message{font-size:1.05rem;font-weight:800;min-height:28px}.round-info{color:var(--muted);font-size:.84rem;margin-top:5px}@media(max-width:900px){.game{grid-template-columns:1fr;gap:12px}.centre{order:1}.money-board{order:2;grid-template-columns:repeat(6,minmax(0,1fr));padding:10px}.right-board{display:grid;order:3}.money{font-size:.68rem;padding:6px 2px}.boxes{grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.case{min-height:62px;font-size:1.15rem}.player-box .case{width:min(130px,45vw)}}@media(max-width:480px){.app{padding-left:10px;padding-right:10px}.boxes{grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.case{font-size:1.05rem;min-height:58px}.money-board{grid-template-columns:repeat(4,minmax(0,1fr));gap:4px}.money{font-size:.64rem}.home{font-size:0;padding:10px 12px}.home:after{content:"🏠";font-size:1rem}.offer-actions{grid-template-columns:1fr}.status{padding:14px}.player-box{padding:12px}}
</style>
</head>
<body>
<div class="app">
<header class="topbar"><div class="logo">SB</div><div class="title"><small>Skinners Bar Games</small><h1>Deal or No Deal</h1></div><a class="home" href="index.html">🏠 Home</a></header>
<section class="status panel"><h2 id="headline">Choose your box</h2><p id="instruction">Pick the box you want to keep until the end.</p></section>
<div class="game">
<div id="leftMoney" class="money-board panel"></div>
<main class="centre">
<section id="playerPanel" class="player-box panel" hidden><div>Your box</div><button id="playerCase" class="case chosen" disabled></button></section>
<div id="boxes" class="boxes"></div>
<section class="controls panel"><div id="message" class="message">Choose one box to keep.</div><div id="roundInfo" class="round-info"></div><button id="restart" class="restart" hidden>Play Again</button></section>
</main>
<div id="rightMoney" class="money-board panel right-board"></div>
</div>
</div>
<div id="offer" class="offer hidden"><div class="offer-card panel"><div class="phone">☎️</div><h2>The Banker is calling…</h2><p>The offer is</p><div id="offerAmount" class="amount">£0</div><div class="offer-actions"><button id="deal" class="deal">DEAL</button><button id="noDeal" class="no-deal">NO DEAL</button></div></div></div>
<script>
const amounts=[0.01,0.1,0.5,1,5,10,50,100,250,500,750,1000,3000,5000,10000,15000,20000,35000,50000,75000,100000,250000];
const rounds=[5,3,3,3,3,2,1,1,1,1];
let values=[],opened=new Set(),chosen=null,round=0,toOpen=0,offer=0,ended=false;
const $=id=>document.getElementById(id);const money=x=>x<1?`${Math.round(x*100)}p`:`£${x.toLocaleString('en-GB')}`;
function shuffle(a){for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function drawMoney(){const left=amounts.slice(0,11),right=amounts.slice(11);$('leftMoney').innerHTML=left.map(v=>`<div class="money low ${openedValues().includes(v)?'gone':''}">${money(v)}</div>`).join('');$('rightMoney').innerHTML=right.map(v=>`<div class="money ${openedValues().includes(v)?'gone':''}">${money(v)}</div>`).join('')}
function openedValues(){return [...opened].map(i=>values[i-1])}
function remainingValues(){return values.filter((_,i)=>!opened.has(i+1)&&i+1!==chosen).concat(chosen? [values[chosen-1]]:[])}
function drawBoxes(){const wrap=$('boxes');wrap.innerHTML='';for(let n=1;n<=22;n++){if(n===chosen)continue;const b=document.createElement('button');b.className='case'+(opened.has(n)?' opened':'');b.textContent=opened.has(n)?money(values[n-1]):n;b.disabled=opened.has(n)||ended;b.onclick=()=>pick(n,b);wrap.appendChild(b)}}
function choose(n){chosen=n;$('playerPanel').hidden=false;$('playerCase').textContent=n;$('headline').textContent='Open the boxes';round=0;toOpen=rounds[round];$('instruction').textContent=`Open ${toOpen} boxes before the Banker calls.`;$('message').textContent='Keep the big money in play!';update()}
function pick(n,b){if(chosen===null){choose(n);return}if(ended||opened.has(n))return;opened.add(n);b.classList.add('reveal');const value=values[n-1];$('message').textContent=`Box ${n} contained ${money(value)}`;toOpen--;update();if(toOpen<=0)setTimeout(banker,700)}
function update(){drawBoxes();drawMoney();$('roundInfo').textContent=chosen===null?'':`Round ${round+1} · ${Math.max(0,toOpen)} box${toOpen===1?'':'es'} to open`}
function banker(){const remain=remainingValues();const avg=remain.reduce((a,b)=>a+b,0)/remain.length;const danger=Math.max(...remain)/Math.max(1,avg);const generosity=.55+round*.045+Math.random()*.12;offer=Math.max(1,Math.round(avg*generosity/(danger>6?1.1:1)/10)*10);$('offerAmount').textContent=money(offer);$('offer').classList.remove('hidden')}
function continueGame(){$('offer').classList.add('hidden');round++;if(remainingValues().length<=2){finalChoice();return}toOpen=rounds[Math.min(round,rounds.length-1)];$('instruction').textContent=`No Deal! Open ${toOpen} more box${toOpen===1?'':'es'}.`;$('message').textContent='The game continues…';update()}
function finish(text,won){ended=true;$('offer').classList.add('hidden');$('headline').textContent='Game Over';$('instruction').textContent=text;$('message').textContent=`You leave with ${money(won)}`;$('restart').hidden=false;drawBoxes();drawMoney()}
function finalChoice(){const other=[...Array(22)].map((_,i)=>i+1).find(n=>n!==chosen&&!opened.has(n));const keep=confirm(`Only two boxes remain. Keep Box ${chosen}?\nPress Cancel to swap to Box ${other}.`);const winBox=keep?chosen:other;const loseBox=keep?other:chosen;opened.add(loseBox);finish(`Box ${winBox} contained ${money(values[winBox-1])}.`,values[winBox-1])}
$('deal').onclick=()=>finish(`You accepted the Banker's offer of ${money(offer)}. Your box held ${money(values[chosen-1])}.`,offer);$('noDeal').onclick=continueGame;$('restart').onclick=init;
function init(){values=shuffle([...amounts]);opened=new Set();chosen=null;round=0;toOpen=0;offer=0;ended=false;$('playerPanel').hidden=true;$('restart').hidden=true;$('offer').classList.add('hidden');$('headline').textContent='Choose your box';$('instruction').textContent='Pick the box you want to keep until the end.';$('message').textContent='Choose one box to keep.';$('roundInfo').textContent='';update()}
init();
</script>
</body>
</html>
