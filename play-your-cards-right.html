<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#120b16" />
  <title>Play Your Cards Right | Skinners Bar Games</title>
  <style>
    :root{--gold:#f7c85e;--gold2:#ffed9d;--pink:#ff4aa2;--purple:#8b5cf6;--text:#fff7eb;--muted:#c6b6c8;--success:#5ce1a1;--shadow:0 18px 60px rgba(0,0,0,.34)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#28102d 0,#100812 50%,#08060a 100%);color:var(--text);font-family:Inter,ui-rounded,"SF Pro Rounded","Segoe UI",sans-serif}body{min-height:100dvh;overflow-x:hidden}button,select,input{font:inherit}button{cursor:pointer}.ambient{position:fixed;border-radius:50%;filter:blur(70px);opacity:.24;pointer-events:none}.one{width:260px;height:260px;background:var(--pink);top:-80px;left:-90px}.two{width:300px;height:300px;background:var(--purple);right:-140px;bottom:5%}.app{width:min(820px,100%);margin:auto;padding:calc(env(safe-area-inset-top) + 18px) 14px calc(env(safe-area-inset-bottom) + 28px)}.bar{display:flex;align-items:center;gap:12px;margin-bottom:18px}.mark{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(145deg,var(--gold2),var(--gold));color:#21131e;font-weight:1000;box-shadow:0 0 28px rgba(247,200,94,.34)}h1{font-size:clamp(1.2rem,5vw,1.8rem);line-height:1;margin:3px 0 0}.eyebrow{text-transform:uppercase;font-size:.68rem;letter-spacing:.16em;color:var(--gold);font-weight:800}.home{margin-left:auto;width:46px;height:44px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff}.glass{background:linear-gradient(145deg,rgba(54,31,61,.9),rgba(25,14,29,.92));border:1px solid rgba(255,255,255,.1);box-shadow:var(--shadow);backdrop-filter:blur(18px)}.setup,.game,.result{border-radius:26px;padding:22px}.setup h2,.game h2{margin:0 0 8px}.setup p,.muted{color:var(--muted);line-height:1.5}.form{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:18px 0}.field{display:grid;gap:7px}.field label{font-size:.8rem;color:var(--muted);font-weight:800}.field input,.field select{width:100%;min-height:50px;border-radius:14px;border:1px solid rgba(255,255,255,.13);background:rgba(0,0,0,.22);color:white;padding:10px 14px}.btn{min-height:52px;border-radius:16px;border:1px solid rgba(255,255,255,.12);padding:12px 15px;font-weight:900;color:var(--text);background:rgba(255,255,255,.08)}.primary{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#241521;border:0}.full{width:100%}.hidden{display:none!important}.topline{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.score{display:flex;gap:8px;flex-wrap:wrap}.pill{padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.08);font-size:.75rem;font-weight:900}.pill b{color:var(--gold2)}.message{text-align:center;min-height:58px;display:grid;place-items:center;color:var(--gold2);font-weight:1000;font-size:clamp(1.05rem,4vw,1.35rem)}.card-table{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;align-items:center;margin:10px 0 18px}.card{aspect-ratio:2.5/3.5;border-radius:18px;background:#fff;color:#171117;border:5px solid rgba(255,255,255,.75);box-shadow:0 14px 24px rgba(0,0,0,.28);display:grid;place-items:center;position:relative;min-width:0;transition:transform .35s ease}.card.red{color:#d62839}.card.current{outline:4px solid var(--gold);transform:translateY(-7px)}.rank{font-size:clamp(1.6rem,7vw,3.2rem);font-weight:1000}.suit{font-size:clamp(1.4rem,6vw,2.6rem);line-height:1}.corner{position:absolute;font-weight:1000;font-size:clamp(.75rem,2.8vw,1.1rem);line-height:.9}.tl{top:8px;left:8px}.br{right:8px;bottom:8px;transform:rotate(180deg)}.back{background:repeating-linear-gradient(45deg,#4c1d61,#4c1d61 10px,#7b2cbf 10px,#7b2cbf 20px);color:white}.back::after{content:'SB';display:grid;place-items:center;width:55%;aspect-ratio:1;border-radius:50%;background:var(--gold);color:#241521;font-weight:1000;font-size:clamp(1rem,4vw,1.8rem)}.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}.choice{min-height:72px;font-size:1.05rem}.higher{background:linear-gradient(135deg,rgba(92,225,161,.28),rgba(92,225,161,.12))}.lower{background:linear-gradient(135deg,rgba(255,107,107,.28),rgba(255,107,107,.12))}.result{text-align:center}.result-emoji{font-size:4rem}.result h2{font-size:2rem;margin:8px 0}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.history{margin-top:14px;padding:15px;border-radius:20px}.history h3{margin:0 0 10px}.history-list{display:flex;gap:7px;overflow:auto}.mini{min-width:46px;height:60px;border-radius:9px;background:white;color:#171117;display:grid;place-items:center;font-weight:1000}.mini.red{color:#d62839}@media(max-width:600px){.form{grid-template-columns:1fr}.card-table{gap:5px}.card{border-width:3px;border-radius:11px}.choices,.actions{grid-template-columns:1fr}.choice{min-height:62px}.setup,.game,.result{padding:17px}}
  </style>
</head>
<body>
  <div class="ambient one"></div><div class="ambient two"></div>
  <main class="app">
    <header class="bar"><div class="mark">SB</div><div><div class="eyebrow">Skinners Bar Games</div><h1>Play Your Cards Right</h1></div><button class="home" onclick="location.href='index.html'" aria-label="Back to games">🏠</button></header>
    <section id="setup" class="setup glass"><div class="eyebrow">Classic higher or lower</div><h2>Can you clear the row?</h2><p>Guess whether the next card will be higher or lower. Equal cards count as a wrong answer.</p><div class="form"><div class="field"><label for="playerName">Player or team name</label><input id="playerName" maxlength="20" value="Player 1"></div><div class="field"><label for="lives">Lives</label><select id="lives"><option value="1">1 life</option><option value="2" selected>2 lives</option><option value="3">3 lives</option></select></div></div><button id="startBtn" class="btn primary full">Start Game</button></section>
    <section id="game" class="game glass hidden"><div class="topline"><div><div class="eyebrow" id="playerLabel">Player 1</div><h2>Higher or lower?</h2></div><div class="score"><span class="pill">Lives: <b id="livesDisplay">2</b></span><span class="pill">Position: <b id="positionDisplay">1 / 5</b></span></div></div><div id="message" class="message">Choose higher or lower</div><div id="cardTable" class="card-table"></div><div class="choices"><button id="higherBtn" class="btn choice higher">⬆️ Higher</button><button id="lowerBtn" class="btn choice lower">⬇️ Lower</button></div><section class="history glass"><h3>Cards played</h3><div id="historyList" class="history-list"></div></section></section>
    <section id="result" class="result glass hidden"><div id="resultEmoji" class="result-emoji">🏆</div><h2 id="resultTitle">You won!</h2><p id="resultText" class="muted"></p><div class="actions"><button id="againBtn" class="btn primary">Play Again</button><button class="btn" onclick="location.href='index.html'">Back to Games</button></div></section>
  </main>
  <script>
    const suits=[['♠','black'],['♥','red'],['♦','red'],['♣','black']],ranks=[{v:2,t:'2'},{v:3,t:'3'},{v:4,t:'4'},{v:5,t:'5'},{v:6,t:'6'},{v:7,t:'7'},{v:8,t:'8'},{v:9,t:'9'},{v:10,t:'10'},{v:11,t:'J'},{v:12,t:'Q'},{v:13,t:'K'},{v:14,t:'A'}];let deck=[],cards=[],position=0,lives=2,busy=false;const $=id=>document.getElementById(id);
    function freshDeck(){deck=[];for(const r of ranks)for(const s of suits)deck.push({value:r.v,rank:r.t,suit:s[0],colour:s[1]});for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}}
    function draw(){return deck.pop()}function cardHTML(c,active=false){return `<div class="card ${c.colour==='red'?'red':''} ${active?'current':''}"><span class="corner tl">${c.rank}<br>${c.suit}</span><div><div class="rank">${c.rank}</div><div class="suit">${c.suit}</div></div><span class="corner br">${c.rank}<br>${c.suit}</span></div>`}
    function render(){$('cardTable').innerHTML='';for(let i=0;i<5;i++)$('cardTable').insertAdjacentHTML('beforeend',cards[i]?cardHTML(cards[i],i===position):'<div class="card back"></div>');$('livesDisplay').textContent=lives;$('positionDisplay').textContent=`${position+1} / 5`;$('historyList').innerHTML=cards.map(c=>`<div class="mini ${c.colour==='red'?'red':''}">${c.rank}${c.suit}</div>`).join('')}
    function start(){freshDeck();cards=[draw()];position=0;lives=Number($('lives').value);$('playerLabel').textContent=$('playerName').value.trim()||'Player 1';$('setup').classList.add('hidden');$('result').classList.add('hidden');$('game').classList.remove('hidden');$('message').textContent='Choose higher or lower';busy=false;render()}
    function finish(won){$('game').classList.add('hidden');$('result').classList.remove('hidden');$('resultEmoji').textContent=won?'🏆':'💥';$('resultTitle').textContent=won?'You cleared the row!':'Game over';$('resultText').textContent=won?`${$('playerLabel').textContent} successfully guessed four cards in a row.`:`${$('playerLabel').textContent} reached card ${position+1} of 5.`}
    function guess(type){if(busy)return;busy=true;const current=cards[position],next=draw(),correct=type==='higher'?next.value>current.value:next.value<current.value;cards[position+1]=next;position++;if(correct){$('message').textContent=`Correct — ${next.rank}${next.suit} is ${type}!`;render();if(position===4){setTimeout(()=>finish(true),700);return}setTimeout(()=>{busy=false;$('message').textContent='Choose higher or lower'},650)}else{lives--;$('message').textContent=next.value===current.value?'Same value — that loses a life!':`Wrong — it was ${next.value>current.value?'higher':'lower'}!`;render();if(lives<=0){setTimeout(()=>finish(false),850);return}setTimeout(()=>{cards=[next];position=0;busy=false;$('message').textContent='New row — choose again';render()},900)}}
    $('startBtn').onclick=start;$('againBtn').onclick=()=>{$('result').classList.add('hidden');$('setup').classList.remove('hidden')};$('higherBtn').onclick=()=>guess('higher');$('lowerBtn').onclick=()=>guess('lower');
  </script>
</body>
</html>
