<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Skinners Bar General Knowledge Quiz</title><style>*{box-sizing:border-box}body{margin:0;background:#12081d;color:#fff;font-family:system-ui}.app{max-width:820px;margin:auto;padding:16px}.top{display:flex;align-items:center;gap:12px}.top h1{flex:1}.home,button,input,select{border:0;border-radius:14px;min-height:48px;padding:11px 14px;font:inherit}.home{color:#fff;background:#ffffff14;text-decoration:none}.panel{margin-top:14px;padding:18px;background:#ffffff0e;border:1px solid #ffffff1c;border-radius:22px}.hidden{display:none!important}.setup{display:grid;gap:10px}.setup input,.setup select{width:100%;background:#0d0613;color:#fff;border:1px solid #ffffff22}.buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.primary{background:#ffd65a;color:#321500;font-weight:900}.secondary{background:#ffffff14;color:#fff;font-weight:900}.room{font-size:2.5rem;color:#ffd65a;text-align:center;font-weight:1000;letter-spacing:.12em}.question{font-size:clamp(1.2rem,5vw,2rem);font-weight:900;margin:15px 0}.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px}.answer{text-align:left;background:#ffffff12;color:#fff;border:1px solid #ffffff20;font-weight:900}.correct{background:#34c77d!important;color:#062313}.wrong{background:#cf3554!important}.row{display:flex;justify-content:space-between;background:#0004;padding:9px;border-radius:10px;margin-top:7px}@media(max-width:560px){.buttons,.answers{grid-template-columns:1fr}}</style></head><body><div class="app"><header class="top"><div>🧠</div><h1>General Knowledge Quiz</h1><a class="home" href="index.html">🏠 Home</a></header><section id="setup" class="panel setup"><input id="name" placeholder="Your name or team name" maxlength="18"><select id="count"><option value="5">5 questions</option><option value="10" selected>10 questions</option><option value="15">15 questions</option></select><div class="buttons"><button id="single" class="primary">Single Player</button><button id="create" class="secondary">Create Multiplayer</button><button id="showJoin" class="secondary">Join Multiplayer</button></div><div id="joinBox" class="hidden"><input id="code" maxlength="4" inputmode="numeric" placeholder="Room code"><button id="join" class="primary" style="width:100%;margin-top:8px">Join Room</button></div><p id="status"></p><small>Fresh general-knowledge questions are loaded online. A saved session token helps reduce repeats.</small></section><section id="lobby" class="panel hidden"><h2>Room code</h2><div id="room" class="room"></div><div id="players"></div><button id="startMulti" class="primary hidden" style="width:100%;margin-top:12px">Start Quiz</button><p id="waiting">Waiting for the creator to start.</p></section><section id="game" class="panel hidden"><div class="row"><span id="progress"></span><b id="score">0</b></div><div id="question" class="question"></div><div id="answers" class="answers"></div><button id="next" class="primary hidden" style="width:100%;margin-top:12px">Next Question</button><div id="scores"></div></section><section id="result" class="panel hidden"><h2>Quiz Complete</h2><div id="final"></div><button class="primary" style="width:100%;margin-top:12px" onclick="location.reload()">Play Again</button></section></div><script>const DB='https://skinners-bar-bingo-default-rtdb.europe-west1.firebasedatabase.app/quizRooms',id=localStorage.quizPlayerId||crypto.randomUUID();localStorage.quizPlayerId=id;const $=x=>document.getElementById(x);let qs=[],index=0,score=0,locked=false,room='',host=false,name='Player',timer=null;const show=x=>['setup','lobby','game','result'].forEach(v=>$(v).classList.toggle('hidden',v!==x));const shuffle=a=>[...a].sort(()=>Math.random()-.5);const decode=s=>decodeURIComponent(s);async function api(url,opt){const r=await fetch(url,opt);return r.json()}async function getQuestions(n){let token=localStorage.quizToken||'';if(!token){const t=await api('https://opentdb.com/api_token.php?command=request');token=t.token||'';localStorage.quizToken=token}const d=await api(`https://opentdb.com/api.php?amount=${n}&category=9&type=multiple&encode=url3986${token?'&token='+token:''}`);if(d.response_code!==0){localStorage.removeItem('quizToken');return getQuestions(n)}return d.results.map(x=>{const c=decode(x.correct_answer),a=shuffle([c,...x.incorrect_answers.map(decode)]);return{q:decode(x.question),answers:a,correct:a.indexOf(c)}})}async function readRoom(){return api(`${DB}/${room}.json`)}async function patch(path,data){return api(`${DB}/${room}/${path}.json`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})}function renderScores(players={}){const html=Object.values(players).sort((a,b)=>(b.score||0)-(a.score||0)).map((p,i)=>`<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score||0}</b></div>`).join('');$('players').innerHTML=html;$('scores').innerHTML=html}function render(){locked=false;$('next').classList.add('hidden');$('progress').textContent=`Question ${index+1} of ${qs.length}`;$('score').textContent=`Score: ${score}`;$('question').textContent=qs[index].q;$('answers').innerHTML='';qs[index].answers.forEach((a,n)=>{const b=document.createElement('button');b.className='answer';b.textContent=a;b.onclick=()=>answer(n,b);$('answers').appendChild(b)})}async function answer(n,b){if(locked)return;locked=true;const right=qs[index].correct;[...$('answers').children].forEach((x,j)=>{x.disabled=true;if(j===right)x.classList.add('correct')});if(n===right)score++;else b.classList.add('wrong');$('score').textContent=`Score: ${score}`;if(room)await patch(`players/${id}`,{score,answered:index});if(!room||host)$('next').classList.remove('hidden')}async function single(){name=$('name').value.trim()||'Player';$('status').textContent='Loading fresh questions…';try{qs=await getQuestions(+$('count').value);index=score=0;show('game');render()}catch(e){$('status').textContent='Could not load questions. Check your connection.'}}async function create(){name=$('name').value.trim()||'Host';room=String(Math.floor(1000+Math.random()*9000));host=true;await api(`${DB}/${room}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({hostId:id,phase:'lobby',count:+$('count').value,index:0,players:{[id]:{name,score:0,answered:-1}}})});listen();show('lobby')}async function join(){name=$('name').value.trim()||'Player';room=$('code').value.trim();const r=await readRoom();if(!r){$('status').textContent='Room not found.';return}host=r.hostId===id;await patch(`players/${id}`,{name,score:0,answered:-1});listen();show('lobby')}function listen(){clearInterval(timer);$('room').textContent=room;timer=setInterval(async()=>{const r=await readRoom();if(!r)return;renderScores(r.players);$('startMulti').classList.toggle('hidden',!host);$('waiting').classList.toggle('hidden',host);if(r.phase==='playing'){qs=r.questions||[];const ni=r.index||0;score=r.players?.[id]?.score||0;if(index!==ni||$('game').classList.contains('hidden')){index=ni;show('game');render()}}if(r.phase==='finished'){show('result');$('final').innerHTML=Object.values(r.players||{}).sort((a,b)=>(b.score||0)-(a.score||0)).map((p,i)=>`<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score||0}/${r.count}</b></div>`).join('')}},900)}async function startMulti(){const q=await getQuestions(+$('count').value);await patch('',{phase:'playing',questions:q,index:0})}async function next(){if(!room){index++;if(index<qs.length)render();else{$('final').innerHTML=`<div class="row"><span>${name}</span><b>${score}/${qs.length}</b></div>`;show('result')}return}const ni=index+1;if(ni>=qs.length)await patch('',{phase:'finished'});else await patch('',{index:ni})}$('single').onclick=single;$('create').onclick=create;$('showJoin').onclick=()=>$('joinBox').classList.toggle('hidden');$('join').onclick=join;$('startMulti').onclick=startMulti;$('next').onclick=next;</script></body></html>
