<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Skinners Bar Race Night</title><style>:root{--gold:#ffd75c;--green:#44dc91;--muted:#c8c7c2}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(#123d28,#07160e);color:#fff;font-family:Inter,system-ui,sans-serif}.app{width:min(980px,100%);margin:auto;padding:16px}.top{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#ff9c2c);color:#321500;font-weight:1000}.title{flex:1}.title small{color:var(--gold);font-weight:900;text-transform:uppercase;letter-spacing:.12em}.title h1{margin:2px 0}.home,.btn{border:0;border-radius:14px;min-height:48px;padding:11px 15px;font-weight:1000;cursor:pointer}.home{background:#ffffff10;color:#fff;text-decoration:none;border:1px solid #ffffff22}.panel{margin-top:14px;padding:16px;border-radius:23px;background:#ffffff0d;border:1px solid #ffffff18;box-shadow:0 18px 50px #0008}.horses{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.horse-pick{background:#ffffff0d;color:#fff;border:1px solid #ffffff22;border-radius:17px;padding:14px;text-align:left;cursor:pointer}.horse-pick.active{outline:3px solid var(--gold);background:#ffd75c20}.horse-pick strong{display:block;font-size:1.05rem}.horse-pick span{font-size:2rem}.primary{background:linear-gradient(135deg,var(--gold),#ff962e);color:#361600;width:100%;margin-top:12px}.track{position:relative;overflow:hidden;padding:10px;background:#56341d;border:5px solid #d2b26b;border-radius:22px}.lane{position:relative;height:64px;border-bottom:2px dashed #ffffff55;background:linear-gradient(90deg,#436c31,#55933f)}.lane:last-child{border-bottom:0}.runner{position:absolute;left:4px;top:8px;font-size:2.7rem;transform:translateX(0);will-change:transform}.finish{position:absolute;right:20px;top:0;bottom:0;width:8px;background:repeating-linear-gradient(#fff 0 10px,#111 10px 20px);z-index:1}.lane-label{position:absolute;left:4px;bottom:2px;font-size:.65rem;color:#fff;background:#0007;padding:2px 5px;border-radius:7px}.status{text-align:center;font-weight:900;font-size:1.15rem}.leaderboard{display:grid;gap:7px}.result-row{display:flex;justify-content:space-between;background:#0004;padding:9px 11px;border-radius:10px}.hidden{display:none!important}@media(max-width:600px){.horses{grid-template-columns:1fr 1fr}.lane{height:55px}.runner{font-size:2.25rem}.home{font-size:0}.home:after{content:'🏠';font-size:1rem}}</style></head><body><div class="app"><header class="top"><div class="logo">SB</div><div class="title"><small>Skinners Bar Games</small><h1>Race Night</h1></div><a class="home" href="index.html">🏠 Home</a></header><section id="setup" class="panel"><h2>Choose your horse</h2><div id="horseChoices" class="horses"></div><button id="start" class="btn primary" disabled>Start Race</button></section><section id="racePanel" class="panel hidden"><div class="track"><div class="finish"></div><div id="lanes"></div></div><div id="status" class="panel status">And they're off!</div></section><section id="results" class="panel hidden"><h2>Race Result</h2><div id="leaderboard" class="leaderboard"></div><p id="verdict" class="status"></p><button id="again" class="btn primary">Race Again</button></section></div><script>const horses=[['Thunder','🐎'],['Lucky Lad','🏇'],['Red Rocket','🐴'],['Fife Flyer','🐎'],['Golden Hoof','🏇'],['Last Orders','🐴']];let chosen=-1,racing=false;const $=id=>document.getElementById(id);function setup(){const wrap=$('horseChoices');wrap.innerHTML='';horses.forEach(([name,icon],i)=>{const b=document.createElement('button');b.className='horse-pick';b.innerHTML=`<span>${icon}</span><strong>${i+1}. ${name}</strong><small>Tap to choose</small>`;b.onclick=()=>{chosen=i;[...wrap.children].forEach((x,j)=>x.classList.toggle('active',j===i));$('start').disabled=false};wrap.appendChild(b)})}function startRace(){if(chosen<0||racing)return;racing=true;$('setup').classList.add('hidden');$('results').classList.add('hidden');$('racePanel').classList.remove('hidden');$('status').textContent="And they're off!";const lanes=$('lanes');lanes.innerHTML='';const runners=horses.map(([name,icon],i)=>{const lane=document.createElement('div');lane.className='lane';lane.innerHTML=`<div class="lane-label">${i+1}. ${name}</div><div class="runner">${icon}</div>`;lanes.appendChild(lane);return lane.querySelector('.runner')});const progress=horses.map(()=>0),speed=horses.map(()=>.18+Math.random()*.12),finished=[];let last=performance.now();function frame(now){const dt=Math.min(40,now-last);last=now;progress.forEach((p,i)=>{if(p>=100)return;speed[i]+=(Math.random()-.48)*.015;speed[i]=Math.max(.12,Math.min(.42,speed[i]));progress[i]=Math.min(100,p+speed[i]*dt);runners[i].style.transform=`translateX(calc(${progress[i]}% * 8.1))`;if(progress[i]>=100&&!finished.includes(i))finished.push(i)});if(finished.length<horses.length)requestAnimationFrame(frame);else finish(finished)}requestAnimationFrame(frame)}function finish(order){racing=false;$('racePanel').classList.add('hidden');$('results').classList.remove('hidden');$('leaderboard').innerHTML=order.map((i,pos)=>`<div class="result-row"><span>${pos+1}. ${horses[i][1]} ${horses[i][0]}</span><strong>${pos===0?'WINNER':''}</strong></div>`).join('');$('verdict').textContent=order[0]===chosen?`🏆 ${horses[chosen][0]} won — great pick!`:`${horses[chosen][0]} finished ${order.indexOf(chosen)+1}${['st','nd','rd'][order.indexOf(chosen)]||'th'}.`}setup();chosen=-1;$('start').disabled=true}$('start').onclick=startRace;$('again').onclick=()=>{$('results').classList.add('hidden');$('setup').classList.remove('hidden')};setup();</script></body></html>
