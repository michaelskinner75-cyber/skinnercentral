<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Skinners Bar Wheel of Fortune</title><style>:root{--gold:#ffd75b;--pink:#ff4a9b;--muted:#cbbdca}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#4a155f,#170820 50%,#08030b);color:#fff;font-family:Inter,system-ui,sans-serif}.app{width:min(850px,100%);margin:auto;padding:16px}.top{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#ff9b2b);color:#351500;font-weight:1000}.title{flex:1}.title small{color:var(--gold);font-weight:900;text-transform:uppercase;letter-spacing:.12em}.title h1{margin:2px 0}.home,.btn{border:0;border-radius:14px;min-height:48px;padding:11px 15px;font-weight:1000;cursor:pointer}.home{background:#ffffff10;color:#fff;text-decoration:none;border:1px solid #ffffff22}.panel{margin-top:14px;padding:16px;border-radius:24px;background:#ffffff0d;border:1px solid #ffffff18;box-shadow:0 18px 50px #0008}.setup textarea{width:100%;min-height:150px;border-radius:15px;background:#0d0611;color:#fff;border:1px solid #ffffff24;padding:12px;font:inherit;resize:vertical}.primary{width:100%;margin-top:10px;background:linear-gradient(135deg,var(--gold),#ff982b);color:#351500}.wheel-wrap{position:relative;width:min(540px,88vw);aspect-ratio:1;margin:10px auto}.pointer{position:absolute;left:50%;top:-5px;transform:translateX(-50%);z-index:4;width:0;height:0;border-left:22px solid transparent;border-right:22px solid transparent;border-top:48px solid var(--gold);filter:drop-shadow(0 4px 4px #0008)}canvas{width:100%;height:100%;border-radius:50%;display:block;box-shadow:0 0 0 8px #d9a82e,0 0 0 14px #5d2600,0 18px 55px #000a}.spin{display:block;width:min(300px,100%);margin:18px auto 0;background:linear-gradient(135deg,#ff4a9b,#a91b69);color:#fff;font-size:1.15rem}.result{text-align:center;font-size:1.3rem;font-weight:1000;min-height:34px;color:var(--gold)}.edit{display:grid;grid-template-columns:1fr 1fr;gap:10px}.secondary{background:#ffffff10;color:#fff;border:1px solid #ffffff22}.hidden{display:none!important}@media(max-width:520px){.edit{grid-template-columns:1fr}.home{font-size:0}.home:after{content:'🏠';font-size:1rem}}</style></head><body><div class="app"><header class="top"><div class="logo">SB</div><div class="title"><small>Skinners Bar Games</small><h1>Wheel of Fortune</h1></div><a class="home" href="index.html">🏠 Home</a></header><section id="setup" class="panel setup"><h2>Create your wheel</h2><p>Enter one name, prize or challenge per line.</p><textarea id="items">Free drink
Choose the next song
Take a dare
Winner
Try again
Pick someone else
Bonus prize
Everyone cheers</textarea><button id="build" class="btn primary">Build Wheel</button></section><section id="game" class="panel hidden"><div class="wheel-wrap"><div class="pointer"></div><canvas id="wheel" width="700" height="700"></canvas></div><div id="result" class="result">Ready to spin!</div><button id="spin" class="btn spin">SPIN THE WHEEL</button><div class="edit"><button id="remove" class="btn secondary" disabled>Remove winner</button><button id="change" class="btn secondary">Change wheel</button></div></section></div><script>const $=id=>document.getElementById(id),canvas=$('wheel'),ctx=canvas.getContext('2d');let items=[],rotation=0,spinning=false,lastWinner=-1;const colours=['#ff4a9b','#7b4dff','#1fc98d','#f19a2a','#3e9cff','#db3f55','#a85be9','#2ab9b0'];function draw(){const n=items.length,arc=Math.PI*2/n;ctx.clearRect(0,0,700,700);ctx.save();ctx.translate(350,350);ctx.rotate(rotation);items.forEach((text,i)=>{ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,330,i*arc,(i+1)*arc);ctx.closePath();ctx.fillStyle=colours[i%colours.length];ctx.fill();ctx.strokeStyle='#ffffff66';ctx.lineWidth=3;ctx.stroke();ctx.save();ctx.rotate(i*arc+arc/2);ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font=`900 ${Math.max(20,Math.min(34,260/n))}px system-ui`;ctx.shadowColor='#000';ctx.shadowBlur=4;ctx.fillText(text.slice(0,24),292,10);ctx.restore()});ctx.beginPath();ctx.arc(0,0,62,0,Math.PI*2);ctx.fillStyle='#ffd75b';ctx.fill();ctx.fillStyle='#351500';ctx.font='1000 26px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('SPIN',0,0);ctx.restore()}function build(){items=$('items').value.split('\n').map(x=>x.trim()).filter(Boolean).slice(0,20);if(items.length<2){alert('Please add at least two wheel items.');return}rotation=0;lastWinner=-1;$('setup').classList.add('hidden');$('game').classList.remove('hidden');$('result').textContent='Ready to spin!';$('remove').disabled=true;draw()}function spin(){if(spinning||items.length<2)return;spinning=true;$('spin').disabled=true;$('remove').disabled=true;$('result').textContent='Spinning…';const start=performance.now(),duration=4200+Math.random()*1200,startRot=rotation,turns=6+Math.random()*5,target=startRot+turns*Math.PI*2;function frame(now){const p=Math.min(1,(now-start)/duration),ease=1-Math.pow(1-p,4);rotation=startRot+(target-startRot)*ease;draw();if(p<1)requestAnimationFrame(frame);else finish()}requestAnimationFrame(frame)}function finish(){spinning=false;$('spin').disabled=false;rotation%=Math.PI*2;const arc=Math.PI*2/items.length,angle=(Math.PI*1.5-rotation+Math.PI*2)%(Math.PI*2);lastWinner=Math.floor(angle/arc)%items.length;$('result').textContent=`🎉 ${items[lastWinner]}`;$('remove').disabled=false;draw()}function removeWinner(){if(lastWinner<0||items.length<=2)return;items.splice(lastWinner,1);lastWinner=-1;$('result').textContent='Winner removed — spin again!';$('remove').disabled=true;draw()}$('build').onclick=build;$('spin').onclick=spin;$('remove').onclick=removeWinner;$('change').onclick=()=>{$('game').classList.add('hidden');$('setup').classList.remove('hidden')};</script></body></html>
