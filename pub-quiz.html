<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Skinners Bar Pub Quiz</title><style>:root{--gold:#ffd65a;--pink:#ff4c98;--panel:#ffffff10;--muted:#cbbdca}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#452064,#170b25 48%,#08040d);color:#fff;font-family:Inter,system-ui,sans-serif}.app{width:min(850px,100%);margin:auto;padding:16px}.top{display:flex;gap:12px;align-items:center}.logo{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#ff9b2d);color:#341600;font-weight:1000}.title{flex:1}.title small{color:var(--gold);font-weight:900;text-transform:uppercase;letter-spacing:.12em}.title h1{margin:2px 0}.home,.btn{border:0;border-radius:14px;min-height:48px;padding:11px 15px;font-weight:1000;cursor:pointer}.home{background:#ffffff12;color:#fff;text-decoration:none;border:1px solid #ffffff20}.panel{margin-top:14px;padding:18px;border-radius:24px;background:var(--panel);border:1px solid #ffffff18;box-shadow:0 18px 50px #0008}.setup{display:grid;gap:10px}.setup input,.setup select{width:100%;min-height:48px;border-radius:13px;border:1px solid #ffffff22;background:#100817;color:#fff;padding:10px 12px;font-size:1rem}.primary{background:linear-gradient(135deg,var(--gold),#ff9828);color:#361700}.secondary{background:#ffffff12;color:#fff;border:1px solid #ffffff22}.question{font-size:clamp(1.2rem,5vw,2rem);font-weight:900;line-height:1.25;margin:10px 0 18px}.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px}.answer{min-height:62px;text-align:left;background:#ffffff10;color:#fff;border:1px solid #ffffff20}.answer.correct{background:linear-gradient(135deg,#42df91,#16975b);color:#082616}.answer.wrong{background:linear-gradient(135deg,#f04b67,#a7132d)}.scorebar{display:flex;justify-content:space-between;gap:10px;color:var(--muted)}.hidden{display:none!important}.result{text-align:center}.result strong{font-size:3rem;color:var(--gold)}@media(max-width:520px){.answers{grid-template-columns:1fr}.home{font-size:0}.home:after{content:'🏠';font-size:1rem}}</style></head><body><div class="app"><header class="top"><div class="logo">SB</div><div class="title"><small>Skinners Bar Games</small><h1>Pub Quiz</h1></div><a class="home" href="index.html">🏠 Home</a></header><section id="setup" class="panel setup"><h2>Start a Quiz</h2><input id="team" maxlength="24" placeholder="Team name"><select id="category"><option value="mixed">Mixed Questions</option><option value="music">Music</option><option value="scotland">Scotland</option><option value="general">General Knowledge</option></select><select id="count"><option value="5">5 Questions</option><option value="10" selected>10 Questions</option><option value="15">15 Questions</option></select><button id="start" class="btn primary">Start Quiz</button></section><section id="game" class="panel hidden"><div class="scorebar"><span id="progress">Question 1</span><span>Score: <b id="score">0</b></span></div><div id="question" class="question"></div><div id="answers" class="answers"></div><button id="next" class="btn primary hidden" style="width:100%;margin-top:12px">Next Question</button></section><section id="result" class="panel result hidden"><h2>Quiz Complete</h2><p id="teamResult"></p><strong id="finalScore">0/0</strong><p id="verdict"></p><button id="again" class="btn primary">Play Again</button></section></div><script>const bank={mixed:[['What is the capital of Australia?',['Sydney','Canberra','Melbourne','Perth'],1],['Which planet is known as the Red Planet?',['Venus','Mars','Jupiter','Mercury'],1],['How many sides has a hexagon?',['5','6','7','8'],1],['Which animal is the largest mammal?',['Elephant','Blue whale','Giraffe','Hippo'],1],['What colour do blue and yellow make?',['Purple','Orange','Green','Red'],2]],music:[['Which instrument normally has 88 keys?',['Guitar','Piano','Violin','Trumpet'],1],['Who is known as the King of Pop?',['Elvis Presley','Michael Jackson','Prince','Freddie Mercury'],1],['How many strings does a standard guitar have?',['4','5','6','7'],2],['Which symbol raises a note by a semitone?',['Flat','Sharp','Rest','Clef'],1],['Which band recorded Bohemian Rhapsody?',['ABBA','Queen','Oasis','U2'],1]],scotland:[['What is the capital of Scotland?',['Glasgow','Edinburgh','Aberdeen','Dundee'],1],['Which loch is linked with a famous monster?',['Loch Lomond','Loch Tay','Loch Ness','Loch Awe'],2],['What is Scotland’s national animal?',['Stag','Unicorn','Lion','Golden eagle'],1],['Which city is known as the Granite City?',['Perth','Aberdeen','Stirling','Inverness'],1],['Ben Nevis is near which town?',['Fort William','Oban','Ayr','Dunfermline'],0]],general:[['What is H2O commonly called?',['Salt','Water','Oxygen','Hydrogen'],1],['Which ocean is the largest?',['Atlantic','Indian','Pacific','Arctic'],2],['How many days are in a leap year?',['364','365','366','367'],2],['Which country gifted the Statue of Liberty to the USA?',['France','Spain','Italy','Canada'],0],['What is the fastest land animal?',['Lion','Cheetah','Horse','Greyhound'],1]]};let qs=[],i=0,score=0,locked=false;const $=id=>document.getElementById(id);function allQuestions(cat){return cat==='mixed'?[...bank.general,...bank.music,...bank.scotland]:bank[cat]}function shuffle(a){return a.sort(()=>Math.random()-.5)}function start(){const cat=$('category').value,count=+$('count').value;qs=shuffle([...allQuestions(cat)]);while(qs.length<count)qs=qs.concat(shuffle([...allQuestions(cat)]));qs=qs.slice(0,count);i=0;score=0;$('setup').classList.add('hidden');$('result').classList.add('hidden');$('game').classList.remove('hidden');show()}function show(){locked=false;$('next').classList.add('hidden');$('score').textContent=score;$('progress').textContent=`Question ${i+1} of ${qs.length}`;const [q,answers]=qs[i];$('question').textContent=q;$('answers').innerHTML='';answers.forEach((a,n)=>{const b=document.createElement('button');b.className='btn answer';b.textContent=a;b.onclick=()=>answer(n,b);$('answers').appendChild(b)})}function answer(n,b){if(locked)return;locked=true;const correct=qs[i][2];[...$('answers').children].forEach((x,j)=>{x.disabled=true;if(j===correct)x.classList.add('correct')});if(n===correct)score++;else b.classList.add('wrong');$('score').textContent=score;$('next').classList.remove('hidden')}function next(){i++;if(i<qs.length)show();else finish()}function finish(){$('game').classList.add('hidden');$('result').classList.remove('hidden');$('teamResult').textContent=($('team').value.trim()||'Your team')+' scored';$('finalScore').textContent=`${score}/${qs.length}`;const p=score/qs.length;$('verdict').textContent=p===1?'Perfect score!':p>=.7?'Brilliant effort!':p>=.5?'Good game!':'Time for another round!'}$('start').onclick=start;$('next').onclick=next;$('again').onclick=()=>{$('result').classList.add('hidden');$('setup').classList.remove('hidden')};</script></body></html>
